name: PlayStore Update Check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 이제 정상 작동

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행 시간 출력
        run: |
          echo "⏰ 실행 시간 (UTC): $(date -u)"
          echo "⏰ 실행 시간 (KST): $(TZ='Asia/Seoul' date)"

      - name: 체크 실행
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TZ: 'Asia/Seoul'
          PYTHONUNBUFFERED: '1'
        run: python check.py

      - name: 상태 저장
        uses: EndBug/add-and-commit@v9
        with:
          add: 'state.json'
          message: 'update state [skip ci] #${{ github.run_number }}'
          default_author: github_actions
          push: true
        continue-on-error: true
